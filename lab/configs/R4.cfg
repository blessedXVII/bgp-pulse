hostname R4
!
interface Ethernet0/0
 ip address 10.0.24.2 255.255.255.252
 no shutdown
!
interface Ethernet0/1
 ip address 10.0.34.2 255.255.255.252
 no shutdown
!
interface Ethernet0/2
 ip address 10.0.44.1 255.255.255.252
 no shutdown
!
ip community-list standard COM_EXCELLENT permit 65030:220
ip community-list standard COM_GOOD permit 65030:180
ip community-list standard COM_FAIR permit 65030:130
ip community-list standard COM_POOR permit 65030:80
!
route-map EXABGP_IN permit 10
 match community COM_EXCELLENT
 set local-preference 220
!
route-map EXABGP_IN permit 20
 match community COM_GOOD
 set local-preference 180
!
route-map EXABGP_IN permit 30
 match community COM_FAIR
 set local-preference 130
!
route-map EXABGP_IN permit 40
 match community COM_POOR
 set local-preference 80
!
route-map EXABGP_IN permit 50
!
router bgp 65030
 bgp router-id 4.4.4.4
 bgp log-neighbor-changes
 neighbor 10.0.24.1 remote-as 65010
 neighbor 10.0.34.1 remote-as 65020
 neighbor 10.0.44.2 remote-as 65040
 neighbor 10.0.44.2 send-community
 neighbor 10.0.44.2 route-map EXABGP_IN in
